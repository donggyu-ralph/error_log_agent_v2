apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeline-ingress
  namespace: pipeline
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: agent.atdev.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: error-log-agent
            port:
              number: 8000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-pipeline
  namespace: pipeline
spec:
  stripPrefix:
    prefixes:
      - /pipeline
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeline-api-ingress
  namespace: pipeline
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: pipeline-strip-pipeline@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: agent.atdev.ai
    http:
      paths:
      - path: /pipeline
        pathType: Prefix
        backend:
          service:
            name: data-pipeline
            port:
              number: 8000
