apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-log-agent
  namespace: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: error-log-agent
  template:
    metadata:
      labels:
        app: error-log-agent
    spec:
      serviceAccountName: error-log-agent
      containers:
      - name: error-log-agent
        image: 192.168.50.10:8880/custom/error-log-agent:v3
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: agent-secrets
        - configMapRef:
            name: agent-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
