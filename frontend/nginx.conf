server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to agent
    location /api/ {
        proxy_pass http://agent:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Pipeline API proxy
    location /pipeline/ {
        rewrite ^/pipeline/(.*) /$1 break;
        proxy_pass http://target-service:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
