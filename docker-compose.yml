services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: atdev2025
      POSTGRES_DB: error_log_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d error_log_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: atdev2025
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent:
    build:
      context: .
      dockerfile: Dockerfile.compose
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: error_log_agent
      PG_USER: admin
      PG_PASSWORD: atdev2025
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: atdev2025
      DEPLOY_MODE: compose

  target-service:
    build:
      context: ./target-source
      dockerfile: Dockerfile.compose
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DATABASE: pipeline
      PG_USER: admin
      PG_PASSWORD: atdev2025
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: atdev2025
      QWEN_BASE_URL: "${QWEN_BASE_URL:-https://192.168.50.26:32000/v1}"
      QWEN_API_KEY: "${QWEN_API_KEY:-MOAI-MAC-SECRET-KEY-2025}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - agent
    ports:
      - "3000:80"

networks:
  default:
    name: log-agent-network

volumes:
  pgdata:
  minio-data:
